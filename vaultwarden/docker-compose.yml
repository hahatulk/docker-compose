services:
  vaultwarden:
    image: vaultwarden/server:1.34.3
    container_name: vaultwarden
    restart: always
    environment:
      DOMAIN: "https://domain.ru"
      SIGNUPS_ALLOWED: "true"
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      -  vw-data:/data
    ports:
      - '11001:80'

volumes:
  vw-data:
